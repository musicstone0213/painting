<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Painting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/room.css"/>
</head>
<body>

  <!-- ── 畫布容器 ── -->
  <div id="canvasViewport" class="canvas-viewport">
    <canvas id="mainCanvas"></canvas>
    <div id="cursorLayer" class="cursor-layer"></div>
    <div id="reactionLayer" class="reaction-layer"></div>
    <div id="danmakuLayer" class="danmaku-layer"></div>
    <div id="stickerPreview" class="sticker-preview hidden">
      <img id="stickerPreviewImg"/>
      <div id="stickerHandle" class="sticker-handle"></div>
      <div class="sticker-actions">
        <button id="stickerConfirmBtn" class="sticker-confirm">✓</button>
        <button id="stickerCancelBtn" class="sticker-cancel">✕</button>
      </div>
    </div>
  </div>

  <!-- ── 頂部 HUD ── -->
  <header class="top-hud">
    <div class="hud-left">
      <button class="hud-btn" id="leaveBtn">←</button>
      <div class="hud-code-box">
        <span class="hud-code-label">ROOM</span>
        <span class="hud-code" id="roomCodeDisplay">------</span>
        <button class="hud-copy" id="copyCodeBtn">📋</button>
      </div>
    </div>
    <div class="hud-right">
      <div class="hud-online"><span class="hud-dot"></span><span id="onlineCount">1</span></div>
      <button class="hud-btn" id="musicBtn" title="音樂開關">♪</button>
    </div>
  </header>

  <!-- ── 左側飛入工具列 ── -->
  <div class="side-toolbar" id="sideToolbar">
    <div class="side-toolbar-header">
      <span class="side-toolbar-title">TOOLS</span>
      <button class="side-close-btn" id="sideCloseBtn">✕</button>
    </div>
    <div class="side-section">
      <div class="side-label">COLOR</div>
      <!-- 調色盤：點擊按鈕觸發 hidden input -->
      <div class="color-picker-wrap">
        <input type="color" id="colorPicker" class="color-picker-hidden" value="#1A1A2E"/>
        <button class="color-picker-btn" id="colorPickerBtn">
          <span class="cpb-preview" id="colorPickerPreview"></span>
          <span class="cpb-label">🎨 自訂顏色</span>
          <span class="cpb-arrow">▶</span>
        </button>
      </div>
      <div class="swatches">
        <button class="swatch active" style="background-color:#1A1A2E;" data-color="#1A1A2E"></button>
        <button class="swatch" style="background-color:#FF6B6B;" data-color="#FF6B6B"></button>
        <button class="swatch" style="background-color:#FFD93D;" data-color="#FFD93D"></button>
        <button class="swatch" style="background-color:#4ECDC4;" data-color="#4ECDC4"></button>
        <button class="swatch" style="background-color:#C77DFF;" data-color="#C77DFF"></button>
        <button class="swatch" style="background-color:#ffffff;border-color:#888;" data-color="#ffffff"></button>
        <button class="swatch" style="background-color:#FF8C00;" data-color="#FF8C00"></button>
        <button class="swatch" style="background-color:#00C851;" data-color="#00C851"></button>
        <button class="swatch" style="background-color:#1A1A2E;" data-color="#000000"></button>
      </div>
    </div>
    <div class="side-section">
      <div class="side-label">BRUSH</div>
      <div class="side-brush-row">
        <button class="brush-btn active" data-brush="pen"    title="鉛筆">✏️</button>
        <button class="brush-btn"        data-brush="ink"    title="毛筆">🖌️</button>
        <button class="brush-btn"        data-brush="pixel"  title="像素筆">🟦</button>
        <button class="brush-btn"        data-brush="crayon" title="蠟筆">🖍️</button>
        <button class="brush-btn"        data-brush="marker" title="螢光筆">✨</button>
        <button class="brush-btn"        data-brush="mosaic" title="馬賽克">▦</button>
        <button class="brush-btn"        data-brush="eraser" title="橡皮擦">🧹</button>
      </div>
    </div>
    <div class="side-section">
      <div class="side-label">SIZE</div>
      <div class="side-size-row">
        <button class="size-btn active" data-size="4">●</button>
        <button class="size-btn"        data-size="10">●</button>
        <button class="size-btn"        data-size="22">●</button>
      </div>
    </div>
  </div>

  <!-- ── 三個底部 FAB ── -->
  <!-- 左：工具列開關 -->
  <button class="fab-tools" id="fabTools" title="畫筆工具">🎨</button>

  <!-- 中：模式切換（繪圖時隱藏） -->
  <button class="fab-mode" id="fabMode" title="切換模式">✋</button>

  <!-- 右：主選單 -->
  <div class="fab-container" id="fabContainer">
    <div class="fab-menu hidden" id="fabMenu">
      <button class="fab-item" id="fabChat"><span class="fab-item-icon">💬</span><span class="fab-item-label">聊天</span></button>
      <button class="fab-item" id="fabReaction"><span class="fab-item-icon">😂</span><span class="fab-item-label">表情</span></button>
      <button class="fab-item" id="fabUploadImg"><span class="fab-item-icon">📎</span><span class="fab-item-label">插入圖片</span></button>
    </div>
    <button class="fab-main" id="fabMain">☰</button>
  </div>

  <!-- ── 聊天浮動視窗 ── -->
  <div class="float-panel hidden" id="chatPanel">
    <div class="panel-header"><span class="panel-title">💬 CHAT</span><button class="panel-close" id="chatClose">✕</button></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" class="chat-input" placeholder="說點什麼…" maxlength="200" autocomplete="off"/>
      <button class="chat-send" id="chatSendBtn">▶</button>
    </div>
  </div>

  <!-- ── 表情浮動視窗 ── -->
  <div class="float-panel hidden" id="reactionPanel">
    <div class="panel-header"><span class="panel-title">表情反應</span><button class="panel-close" id="reactionPanelClose">✕</button></div>
    <div class="reaction-grid">
      <button class="reaction-big-btn" data-emoji="👍">👍</button>
      <button class="reaction-big-btn" data-emoji="😂">😂</button>
      <button class="reaction-big-btn" data-emoji="😮">😮</button>
      <button class="reaction-big-btn" data-emoji="🔥">🔥</button>
      <button class="reaction-big-btn" data-emoji="💀">💀</button>
      <button class="reaction-big-btn" data-emoji="❓">❓</button>
    </div>
  </div>

  <!-- ── 排隊畫面 ── -->
  <div id="queueScreen" class="queue-screen hidden">
    <div class="queue-box">
      <div class="queue-icon">⏳</div>
      <h2>房間已滿</h2>
      <p>排隊第 <strong id="queuePos">?</strong> 位</p>
      <p class="queue-sub">有人離開會自動入場</p>
      <button class="queue-leave" onclick="window.location.href='index.html'">離開排隊</button>
    </div>
  </div>

  <div id="notifToast" class="toast notif-toast hidden"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/music.js"></script>
  <script src="js/room.js"></script>
</body>
</html>
